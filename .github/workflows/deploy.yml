name: Build and deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      # Publish the built site to the root of the gh-pages branch.
      # clean-exclude keeps the PR preview directories intact so a push to
      # main never wipes an open PR's preview; force: false rebases onto the
      # branch instead of force-pushing over it.
      - name: Deploy main site to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: public
          clean-exclude: pr-preview/
          force: false

      - name: Create zip for self-hosting
        run: cd public && zip -r ../scatterize.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: scatterize-zip
          path: scatterize.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: scatterize-zip

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          body: |
            Self-hostable build — no server-side code required.

            1. Download `scatterize.zip`
            2. Unzip it
            3. Open index.html in your web browser

            Your data is processed entirely in the browser and never sent anywhere.
          files: scatterize.zip
          make_latest: true
